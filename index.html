<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий Видеохостинг</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }
        .upload-area { background: #1e1e1e; border: 2px dashed #333; padding: 30px; border-radius: 15px; margin-bottom: 30px; }
        .btn-select { background: #e91e63; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-upload { background: #00e676; color: #000; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; }
        input[type="file"] { display: none; }
        #status { margin-top: 15px; color: #00e5ff; font-weight: bold; }
        .video-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-card { background: #1a1a1a; padding: 12px; border-radius: 10px; border: 1px solid #222; text-align: left; }
        video { width: 100%; border-radius: 6px; background: #000; margin-top: 8px; }
        .progress-bar { width: 0%; height: 5px; background: #00e676; margin-top: 10px; transition: width 0.2s; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>🌐 Общая Видеоплатформа</h1>
    <p>Все загруженные файлы сразу появляются на всех устройствах в реальном времени!</p>

    <div class="upload-area">
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">1. Выбрать видео</button>
        <input type="file" id="fileInput" accept="video/*" onchange="fileSelected()">
        <p id="fileName"></p>
        
        <button id="uploadBtn" class="btn-upload" onclick="startUpload()">2. Загрузить для всех</button>
        <div id="progressBar" class="progress-bar"></div>
        <div id="status"></div>
    </div>

    <h2>Лента видео (Обновляется у всех)</h2>
    <div class="video-gallery" id="gallery">Загрузка глобальной ленты...</div>

    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script>
        // Инициализируем общую базу данных (используем публичные сервера)
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const videoNode = gun.get('my_global_free_videos_list_v1');

        // Отслеживание выбора файла
        function fileSelected() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                document.getElementById('fileName').innerText = "Файл готов: " + file.name;
                document.getElementById('uploadBtn').style.display = 'inline-block';
            }
        }

        // Загрузка видео в интернет
        function startUpload() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');

            if (!file) return;
            status.innerText = "Отправка видео в сеть...";

            const formData = new FormData();
            formData.append("reqtype", "fileupload");
            formData.append("fileToUpload", file);

            const xhr = new XMLHttpRequest();
            // Используем corsproxy для обхода защиты
            xhr.open("POST", "https://corsproxy.io/?https://catbox.moe/user/api.php", true);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    progressBar.style.width = percent + "%";
                    status.innerText = `Загрузка в облако: ${Math.round(percent)}%`;
                }
            };

            xhr.onload = function() {
                if (xhr.status === 200) {
                    const videoUrl = xhr.responseText.trim();
                    if(videoUrl.startsWith("https")) {
                        status.innerText = "⚡ Видео сохраняется в глобальную базу...";
                        
                        // Сохраняем ссылку и имя в ОБЩУЮ базу данных GunDB
                        const videoId = 'vid_' + Date.now();
                        videoNode.get(videoId).put({
                            url: videoUrl,
                            name: file.name,
                            time: Date.now()
                        });

                        status.innerText = "🎉 Успешно! Видео доступно всем устройствам.";
                        resetForm();
                    } else {
                        status.innerText = "Ошибка сервера хранилища.";
                    }
                } else {
                    status.innerText = "Ошибка сети при загрузке.";
                }
            };
            xhr.send(formData);
        }

        function resetForm() {
            document.getElementById('fileInput').value = "";
            document.getElementById('fileName').innerText = "";
            document.getElementById('uploadBtn').style.display = 'none';
            document.getElementById('progressBar').style.width = '0%';
        }

        // Сюда будем собирать видео из сети
        let globalVideos = {};

        // Слушаем изменения в глобальной базе данных
        videoNode.map().on(function(data, id) {
            if (data && data.url && data.name) {
                globalVideos[id] = data; // сохраняем или обновляем видео в списке
                renderGallery();
            }
        });

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            const items = Object.values(globalVideos);
            
            if(items.length === 0) {
                gallery.innerHTML = '<p style="color: #666;">Видео пока нет. Стань первым!</p>';
                return;
            }

            // Сортируем, чтобы новые видео были вверху
            items.sort((a, b) => b.time - a.time);

            items.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <strong>📛 ${video.name}</strong>
                    <video controls src="${video.url}" preload="metadata"></video>
                `;
                gallery.appendChild(card);
            });
        }
        
        // Если база пуста или долго грузится, через 3 секунды убираем надпись загрузки
        setTimeout(() => {
            if(Object.keys(globalVideos).length === 0) {
                document.getElementById('gallery').innerHTML = '<p style="color: #666;">Лента пуста или подключается к сети...</p>';
            }
        }, 4000);
    </script>
</body>
</html>
