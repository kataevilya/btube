<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LOXTube - Твой видео-хостинг</title>
    <style>
        /* КЛАССИЧЕСКИЙ КВАДРАТНЫЙ ИНТЕРФЕЙС */
        body { font-family: Arial, sans-serif; background: #FFF; margin: 0; color: #000; }
        #masthead { background: #EAEAEA; border-bottom: 2px solid #999; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 24px; cursor: pointer; }
        
        /* КВАДРАТНЫЙ ПРОФИЛЬ */
        .profile-box { border: 1px solid #999; padding: 2px; display: flex; align-items: center; cursor: pointer; background: #FFF; position: relative; }
        .profile-box img { width: 30px; height: 30px; margin-left: 5px; }
        .dropdown { display: none; position: absolute; top: 100%; right: 0; background: #FFF; border: 1px solid #999; width: 150px; z-index: 100; }
        .dropdown a { display: block; padding: 5px; border-bottom: 1px solid #CCC; }

        .container { max-width: 900px; margin: 20px auto; }
        .video-box { border: 1px solid #999; padding: 10px; margin-bottom: 10px; }
        button { background: #CCC; border: 1px solid #666; cursor: pointer; }
        input, textarea, select { border: 1px solid #999; padding: 5px; }
    </style>
</head>
<body>

<div id="masthead">
    <div class="logo" onclick="window.location.reload()">LOXTube</div>
    <div id="authArea">
        <button onclick="signIn()">Войти</button>
    </div>
</div>

<div class="container" id="main">
    <h3>Загрузить видео</h3>
    <input type="file" id="videoFile" accept="video/*">
    <div id="previewContainer"></div>
    <input type="text" id="vidTitle" placeholder="Название">
    <button onclick="processVideo()">Обработать и загрузить</button>
</div>

<script>
// ГЕНЕРАЦИЯ ПРЕВЬЮ ИЗ ВИДЕО
async function processVideo() {
    const file = document.getElementById('videoFile').files[0];
    const video = document.createElement('video');
    video.src = URL.createObjectURL(file);
    
    const container = document.getElementById('previewContainer');
    container.innerHTML = "Генерация превью...";
    
    setTimeout(() => {
        container.innerHTML = "";
        for(let i=1; i<=3; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = 160; canvas.height = 90;
            video.currentTime = i;
            setTimeout(() => {
                canvas.getContext('2d').drawImage(video, 0, 0, 160, 90);
                canvas.onclick = () => alert("Выбрано превью " + i);
                container.appendChild(canvas);
            }, 500);
        }
    }, 1000);
}

// ВОЗВРАТ КВАДРАТНОГО МЕНЮ
function renderProfile(user) {
    const authArea = document.getElementById('authArea');
    authArea.innerHTML = `
        <div class="profile-box" onclick="this.querySelector('.dropdown').style.display='block'">
            ${user.displayName} <img src="${user.photoURL}">
            <div class="dropdown">
                <a href="#">Изменить профиль</a>
                <a href="#" onclick="logout()">Выйти</a>
            </div>
        </div>
    `;
}
</script>
</body>
</html>
