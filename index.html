<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий Видеохостинг</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }
        .upload-area { background: #1e1e1e; border: 2px dashed #333; padding: 30px; border-radius: 15px; margin-bottom: 30px; }
        .btn-select { background: #e91e63; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-upload { background: #00e676; color: #000; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; }
        input[type="file"] { display: none; }
        #status { margin-top: 15px; color: #00e5ff; font-weight: bold; word-break: break-all; }
        .video-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-card { background: #1a1a1a; padding: 12px; border-radius: 10px; border: 1px solid #222; text-align: left; }
        video { width: 100%; border-radius: 6px; background: #000; margin-top: 8px; }
        .progress-bar { width: 0%; height: 5px; background: #00e676; margin-top: 10px; transition: width 0.2s; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>🌐 Общая Видеоплатформа</h1>
    <p>Все загруженные файлы сразу появляются на всех устройствах!</p>

    <div class="upload-area">
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">1. Выбрать видео</button>
        <input type="file" id="fileInput" accept="video/*" onchange="fileSelected()">
        <p id="fileName"></p>
        
        <button id="uploadBtn" class="btn-upload" onclick="startUpload()">2. Загрузить для всех</button>
        <div id="progressBar" class="progress-bar"></div>
        <div id="status"></div>
    </div>

    <h2>Лента видео (Обновляется у всех)</h2>
    <div class="video-gallery" id="gallery">Загрузка глобальной ленты...</div>

    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script>
        // Инициализируем общую базу данных
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const videoNode = gun.get('my_global_free_videos_list_v2'); // поменяли имя узла, чтобы очистить кэш

        function fileSelected() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                document.getElementById('fileName').innerText = "Файл готов: " + file.name;
                document.getElementById('uploadBtn').style.display = 'inline-block';
            }
        }

        async function startUpload() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');

            if (!file) return;
            status.innerText = "Подготовка к загрузке...";
            progressBar.style.width = "0%";

            const formData = new FormData();
            formData.append("file", file);

            // Используем альтернативный, более стабильный анонимный хостинг файлов tmpfiles.org
            // Он отлично работает с CORS и не требует сторонних прокси-серверов
            try {
                const response = await fetch('https://tmpfiles.org/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }

                const result = await response.json();
                
                // tmpfiles возвращает ссылку на страницу, нам нужно переделать её в прямую ссылку на файл
                if (result && result.data && result.data.url) {
                    let rawUrl = result.data.url;
                    // Превращаем https://tmpfiles.org/XXXXX/name.mp4 в https://tmpfiles.org/dl/XXXXX/name.mp4
                    let downloadUrl = rawUrl.replace("https://tmpfiles.org/", "https://tmpfiles.org/dl/");

                    status.innerText = "⚡ Сохранение в глобальную базу данных...";

                    // Записываем прямую ссылку в GunDB
                    const videoId = 'vid_' + Date.now();
                    videoNode.get(videoId).put({
                        url: downloadUrl,
                        name: file.name,
                        time: Date.now()
                    });

                    status.innerText = "🎉 Успешно загружено и доступно всем!";
                    progressBar.style.width = "100%";
                    resetForm();
                } else {
                    status.innerText = "Не удалось получить ссылку от сервера.";
                }

            } catch (err) {
                console.error(err);
                status.innerText = "❌ Ошибка при загрузке: " + err.message + ". Попробуйте еще раз.";
            }
        }

        function resetForm() {
            document.getElementById('fileInput').value = "";
            document.getElementById('fileName').innerText = "";
            document.getElementById('uploadBtn').style.display = 'none';
        }

        let globalVideos = {};

        // Слушаем изменения в базе данных
        videoNode.map().on(function(data, id) {
            if (data && data.url && data.name) {
                globalVideos[id] = data;
                renderGallery();
            }
        });

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            const items = Object.values(globalVideos);
            
            if(items.length === 0) {
                gallery.innerHTML = '<p style="color: #666;">Видео пока нет. Стань первым!</p>';
                return;
            }

            items.sort((a, b) => b.time - a.time);

            items.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <strong>📛 ${video.name}</strong>
                    <video controls src="${video.url}" preload="metadata"></video>
                `;
                gallery.appendChild(card);
            });
        }
        
        setTimeout(() => {
            if(Object.keys(globalVideos).length === 0) {
                document.getElementById('gallery').innerHTML = '<p style="color: #666;">Видео не найдены или база подключается...</p>';
            }
        }, 4000);
    </script>
</body>
</html>
